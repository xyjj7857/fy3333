services:
  binance-monitor:
    build:
      context: .
      dockerfile: deploy.Dockerfile
    container_name: binance-monitor-app
    restart: always
    ports:
      - "3333:3333"
    volumes:
      # Persistent SQLite database storage on the host
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3333
      # Change this to any secret key for encrypting local api configurations
      - API_ENCRYPTION_KEY=BinanceTradingS3cr3tK3y!@#
      # You can add other server-side environment variables here if needed
      # - GEMINI_API_KEY=your_gemini_api_key_if_used
